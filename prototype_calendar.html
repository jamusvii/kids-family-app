<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 관리 - 우리 가족 이야기</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        @font-face {
            font-family: 'LeeSeoyun';
            src: url('file:///C:/claude_code/kids/docs/fonts/이서윤체.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --cream: #FFF8F0;
            --coral: #FF9B85;
            --mint: #A8E6CF;
            --pink: #DDA0DD;
            --yellow: #FFE4A0;
            --brown: #8B7355;
            --font-title: 'LeeSeoyun', cursive;
            --font-body: 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--cream);
            font-family: var(--font-body);
            color: var(--brown);
            display: flex;
            justify-content: center;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            min-height: 100vh;
        }

        .mobile-wrapper {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(139, 115, 85, 0.1);
            position: relative;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        /* 상단 헤더 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 10px;
        }

        .back-btn {
            color: var(--brown);
            font-size: 24px;
            text-decoration: none;
            cursor: pointer;
            width: 30px;
        }

        .header-title {
            font-family: var(--font-title);
            font-size: 24px;
            color: var(--brown);
            flex: 1;
            text-align: center;
        }

        .add-btn {
            color: var(--coral);
            font-size: 28px;
            cursor: pointer;
            width: 30px;
            text-align: right;
            line-height: 1;
        }

        /* 캘린더 메인 컨테이너 */
        .content {
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 캘린더 영역 */
        .calendar-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.05);
            border: 1px dashed rgba(139, 115, 85, 0.3);
            backdrop-filter: blur(10px);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .month-title {
            font-family: var(--font-title);
            font-size: 22px;
            color: var(--coral);
        }

        .nav-arrow {
            color: var(--brown);
            cursor: pointer;
            font-weight: bold;
            opacity: 0.7;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: #999;
            margin-bottom: 10px;
        }

        .weekdays div:first-child {
            color: var(--coral);
        }

        /* 일요일 */
        .weekdays div:last-child {
            color: #5B9BD5;
        }

        /* 토요일 */

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px 0;
            text-align: center;
        }

        .day-cell {
            position: relative;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--brown);
            cursor: pointer;
        }

        .day-cell.other-month {
            color: #CCC;
        }

        /* 선택된 날짜 원형 하이라이트 */
        .day-cell.selected::before {
            content: '';
            position: absolute;
            width: 34px;
            height: 34px;
            background-color: var(--mint);
            border-radius: 50%;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .day-cell.selected {
            color: white;
            font-weight: 700;
        }

        /* 일정 존재 표시 도트 */
        .dot-container {
            position: absolute;
            bottom: 2px;
            display: flex;
            gap: 2px;
        }

        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--coral);
        }

        .dot.yellow {
            background-color: var(--yellow);
        }

        .dot.pink {
            background-color: var(--pink);
        }

        /* 하단 섹션: 선택된 날짜의 일정 목록 */
        .schedule-section h3 {
            font-family: var(--font-title);
            font-size: 20px;
            color: var(--brown);
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .date-badge {
            font-size: 12px;
            color: var(--coral);
            font-weight: 700;
            margin-bottom: 15px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.9);
            border-left: 4px solid var(--pink);
            border-radius: 8px 12px 12px 8px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(139, 115, 85, 0.05);
            position: relative;
        }

        .event-card.yellow-border {
            border-left-color: var(--yellow);
        }

        .event-card.coral-border {
            border-left-color: var(--coral);
        }

        .event-time {
            font-size: 12px;
            color: #999;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .event-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--brown);
        }

        .event-dday-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background-color: var(--yellow);
            color: var(--brown);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* 하단 네비게이션 복사 (임시 액티브: 일정) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            border-top: 1px solid rgba(139, 115, 85, 0.1);
            padding: 15px 10px;
            justify-content: space-around;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(139, 115, 85, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #A0A0A0;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--coral);
        }

        .nav-icon {
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div class="mobile-wrapper">

        <!-- 헤더 -->
        <nav class="top-nav">
            <a href="C:\claude_code\kids\prototype_dashboard.html" class="back-btn">←</a>
            <span class="header-title">일정 관리</span>
            <div class="add-btn">+</div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <div class="content">

            <!-- 캘린더 위젯 -->
            <div class="calendar-card">
                <div class="month-header">
                    <span class="nav-arrow">◀</span>
                    <span class="month-title">2026년 3월</span>
                    <span class="nav-arrow">▶</span>
                </div>

                <div class="weekdays">
                    <div>일</div>
                    <div>월</div>
                    <div>화</div>
                    <div>수</div>
                    <div>목</div>
                    <div>금</div>
                    <div>토</div>
                </div>

                <div class="days-grid">
                    <!-- 첫주 빈칸 (가라 데이터: 3월 1일이 일요일이라고 가정) -->
                    <div class="day-cell">1</div>
                    <div class="day-cell">2</div>
                    <div class="day-cell"><span class="dot-container"><span class="dot coral"></span></span>3</div>
                    <div class="day-cell">4</div>
                    <div class="day-cell">5</div>
                    <div class="day-cell"><span class="dot-container"><span class="dot pink"></span><span
                                class="dot yellow"></span></span>6</div>
                    <div class="day-cell">7</div>

                    <div class="day-cell">8</div>
                    <div class="day-cell">9</div>
                    <div class="day-cell selected">10</div> <!-- 선택된 오늘 날짜 -->
                    <div class="day-cell">11</div>
                    <div class="day-cell">12</div>
                    <div class="day-cell">13</div>
                    <div class="day-cell"><span class="dot-container"><span class="dot yellow"></span></span>14</div>

                    <div class="day-cell">15</div>
                    <div class="day-cell">16</div>
                    <div class="day-cell">17</div>
                    <div class="day-cell">18</div>
                    <div class="day-cell">19</div>
                    <div class="day-cell">20</div>
                    <div class="day-cell">21</div>

                    <div class="day-cell">22</div>
                    <div class="day-cell"><span class="dot-container"><span class="dot pink"></span></span>23</div>
                    <div class="day-cell">24</div>
                    <div class="day-cell">25</div>
                    <div class="day-cell">26</div>
                    <div class="day-cell">27</div>
                    <div class="day-cell">28</div>

                    <div class="day-cell">29</div>
                    <div class="day-cell">30</div>
                    <div class="day-cell">31</div>
                    <div class="day-cell other-month">1</div>
                    <div class="day-cell other-month">2</div>
                    <div class="day-cell other-month">3</div>
                    <div class="day-cell other-month">4</div>
                </div>
            </div>

            <!-- 선택된 날짜의 일정 목록 -->
            <div class="schedule-section">
                <div class="schedule-header">
                    <h3>상세 일정</h3>
                    <span class="date-badge">3월 10일 (화)</span>
                </div>
                <div class="event-list">

                    <div class="event-card coral-border">
                        <div class="event-time">종일</div>
                        <div class="event-title">학교 결강 (개교기념일)</div>
                    </div>

                    <div class="event-card yellow-border">
                        <div class="event-time">오후 2:00 ~ 4:30</div>
                        <div class="event-title">태권도 학원 국기원 합숙 훈련</div>
                    </div>

                    <div class="event-card pink-border">
                        <div class="event-time">오후 7:00</div>
                        <div class="event-title">가족 외식 (할머니 생신)</div>
                        <div class="event-dday-badge">D-DAY ✨</div>
                    </div>

                </div>
            </div>

        </div> <!-- // content -->

        <!-- 하단 네비게이션 바 -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item">
                <span class="nav-icon">📋</span>
                <span>할 일 관리</span>
            </a>
            <a href="#" class="nav-item active">
                <span class="nav-icon">📅</span>
                <span>일정 관리</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🏫</span>
                <span>학교 정보</span>
            </a>
        </nav>

    </div>

</body>

</html>
