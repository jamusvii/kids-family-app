<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이연준 - 우리 가족 이야기 대시보드</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        @font-face {
            font-family: 'LeeSeoyun';
            src: url('file:///C:/claude_code/kids/docs/fonts/이서윤체.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --cream: #FFF8F0;
            --coral: #FF9B85;
            --mint: #A8E6CF;
            --pink: #DDA0DD;
            --yellow: #FFE4A0;
            --brown: #8B7355;
            --font-title: 'LeeSeoyun', cursive;
            --font-body: 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--cream);
            font-family: var(--font-body);
            color: var(--brown);
            display: flex;
            justify-content: center;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            min-height: 100vh;
        }

        .mobile-wrapper {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: rgba(168, 230, 207, 0.15);
            /* 이연준 테마 컬러 (연한 민트) 전체 배경 */
            box-shadow: 0 0 30px rgba(139, 115, 85, 0.1);
            position: relative;
            overflow-y: auto;
            padding-bottom: 90px;
            /* 하단 네비게이션 공간 */
        }

        /* 상단 네비게이션 & 헤더 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 10px;
        }

        .back-btn {
            color: var(--brown);
            font-size: 24px;
            text-decoration: none;
            cursor: pointer;
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(139, 115, 85, 0.1);
            object-fit: cover;
        }

        .header-title {
            font-family: var(--font-title);
            font-size: 24px;
            color: var(--brown);
        }

        .settings-btn {
            color: var(--brown);
            font-size: 20px;
            cursor: pointer;
            opacity: 0.8;
        }

        /* 대시보드 메인 콘텐츠 영역 */
        .content {
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 섹션 공통 스타일 */
        .section-title {
            font-family: var(--font-title);
            font-size: 22px;
            color: var(--brown);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.05);
            border: 1px dashed rgba(139, 115, 85, 0.3);
            backdrop-filter: blur(10px);
        }

        /* 1. 핵심 할 일 리스트 */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(139, 115, 85, 0.1);
        }

        .task-item:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }

        .check-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--mint);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: transparent;
            transition: all 0.2s;
        }

        .task-item.done .check-btn {
            background-color: var(--mint);
            color: white;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #A0A0A0;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--brown);
        }

        .task-meta {
            display: flex;
            gap: 8px;
        }

        .priority-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        .badge-d1 {
            background-color: var(--coral);
            color: white;
        }

        .badge-d3 {
            background-color: var(--yellow);
            color: var(--brown);
        }

        .badge-cat {
            background-color: #EEE;
            color: #666;
        }

        /* 2. D-Day 카운트다운 (가로 스크롤) */
        .dday-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
            /* Firefox */
        }

        .dday-container::-webkit-scrollbar {
            display: none;
        }

        /* Chrome */

        .dday-card {
            min-width: 100px;
            background: var(--yellow);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(255, 228, 160, 0.4);
        }

        .dday-number {
            font-family: var(--font-title);
            font-size: 28px;
            color: var(--coral);
            margin-bottom: 4px;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }

        .dday-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--brown);
        }

        /* 3. 하교 시간 표시 */
        .bus-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 248, 240, 0.9) 100%);
            border: 2px solid var(--coral);
        }

        .bus-icon {
            font-size: 40px;
            filter: drop-shadow(2px 4px 6px rgba(139, 115, 85, 0.15));
        }

        .bus-info h3 {
            font-family: var(--font-title);
            font-size: 26px;
            color: var(--coral);
            margin-bottom: 2px;
        }

        .bus-info p {
            font-size: 13px;
            color: #666;
        }

        /* 하단 고정 네비게이션 바 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            border-top: 1px solid rgba(139, 115, 85, 0.1);
            padding: 15px 10px;
            justify-content: space-around;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(139, 115, 85, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #A0A0A0;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
        }

        /* 활성화된 탭 (임시로 할 일 탭 활성화 상태) */
        .nav-item.active {
            color: var(--coral);
        }

        .nav-icon {
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div class="mobile-wrapper">

        <!-- 상단 헤더 -->
        <nav class="top-nav">
            <a href="C:\claude_code\kids\prototype_landing.html" class="back-btn">←</a>
            <div class="header-profile">
                <img src="file:///C:/Users/이병화/.gemini/antigravity/brain/d28bddb5-5029-4a60-b052-cb320fc85974/profile_yeo_jun_1772272939774.png"
                    alt="이연준" class="avatar-small" />
                <span class="header-title">이연준</span>
            </div>
            <div class="settings-btn">⚙️</div>
        </nav>

        <!-- 대시보드 콘텐츠 -->
        <div class="content">

            <!-- 1. 핵심 할 일 -->
            <section>
                <h2 class="section-title">📌 이번 주 핵심 할 일</h2>
                <div class="card">
                    <ul class="task-list">
                        <li class="task-item">
                            <div class="check-btn">✔</div>
                            <div class="task-content">
                                <span class="task-text">수학 학원 숙제 풀기</span>
                                <div class="task-meta">
                                    <span class="priority-badge badge-cat">학원</span>
                                    <span class="priority-badge badge-d1">오늘까지</span>
                                </div>
                            </div>
                        </li>

                        <li class="task-item">
                            <div class="check-btn">✔</div>
                            <div class="task-content">
                                <span class="task-text">체육복 미리 가방에 챙기기</span>
                                <div class="task-meta">
                                    <span class="priority-badge badge-cat">학교</span>
                                    <span class="priority-badge badge-d3">수요일까지</span>
                                </div>
                            </div>
                        </li>

                        <li class="task-item done">
                            <div class="check-btn">✔</div>
                            <div class="task-content">
                                <span class="task-text">일요일 국기계양하기</span>
                                <div class="task-meta">
                                    <span class="priority-badge badge-cat">생활</span>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- 2. D-Day -->
            <section>
                <h2 class="section-title">⏰ D-Day 메모</h2>
                <div class="dday-container">
                    <div class="dday-card">
                        <div class="dday-number">D-3</div>
                        <div class="dday-title">수학 수행평가</div>
                    </div>
                    <div class="dday-card" style="background: var(--mint);">
                        <div class="dday-number" style="color: white; text-shadow: none;">D-15</div>
                        <div class="dday-title">여름방학 시작</div>
                    </div>
                    <div class="dday-card" style="background: var(--pink);">
                        <div class="dday-number" style="color: white; text-shadow: none;">D-42</div>
                        <div class="dday-title">가족 여행</div>
                    </div>
                </div>
            </section>

            <!-- 3. 하교 정보 -->
            <section>
                <h2 class="section-title">🚌 오늘 스케줄</h2>
                <div class="card bus-card">
                    <div class="bus-icon">🚌</div>
                    <div class="bus-info">
                        <h3>14:30 하교 예정</h3>
                        <p>탑승 예상 시간 무렵 알림을 드릴게요!</p>
                    </div>
                </div>
            </section>

        </div>

        <!-- 하단 GNB 네비게이션 -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <span class="nav-icon">📋</span>
                <span>할 일 관리</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📅</span>
                <span>일정 관리</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🏫</span>
                <span>학교 정보</span>
            </a>
        </nav>

    </div>

</body>

</html>
